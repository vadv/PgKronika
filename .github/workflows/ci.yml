name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # CI cargo jobs build for host gnu; .cargo/config pins musl for release
  # binaries, but runners have no musl std, so tests/lint can't find core.
  CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets

  deps:
    name: dependency rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- check-deps
      - run: bash scripts/test-bdd-image.sh

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --summary-only --json --output-path coverage.json
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.json

  bdd-meta:
    name: bdd metadata
    runs-on: ubuntu-latest
    outputs:
      image_hash: ${{ steps.meta.outputs.image_hash }}
      platform_slug: ${{ steps.meta.outputs.platform_slug }}
      branch_name: ${{ steps.meta.outputs.branch_name }}
      builder: ${{ steps.meta.outputs.builder }}
      builder_branch_cache: ${{ steps.meta.outputs.builder_branch_cache }}
      builder_main_cache: ${{ steps.meta.outputs.builder_main_cache }}
      image: ${{ steps.meta.outputs.image }}
      can_push: ${{ steps.meta.outputs.can_push }}
    env:
      BDD_IMAGE_CAN_PUSH: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      BDD_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      BDD_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - name: Compute image refs
        id: meta
        run: |
          deps_hash=$(./scripts/bdd-image.sh deps-key)
          image_hash=$(./scripts/bdd-image.sh image-key)
          platform_slug=$(echo "${BDD_PLATFORM}" | tr '/_' '-')
          branch_slug=$(./scripts/bdd-image.sh branch-slug "${BDD_BRANCH_NAME}")
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          {
            echo "image_hash=${image_hash:0:16}"
            echo "platform_slug=${platform_slug}"
            echo "branch_name=${BDD_BRANCH_NAME}"
            echo "builder=ghcr.io/${owner}/pgkronika-bdd-builder:builder-${platform_slug}-${deps_hash:0:16}"
            echo "builder_branch_cache=ghcr.io/${owner}/pgkronika-bdd-builder:builder-${platform_slug}-branch-${branch_slug}"
            echo "builder_main_cache=ghcr.io/${owner}/pgkronika-bdd-builder:builder-${platform_slug}-branch-main"
            echo "image=ghcr.io/${owner}/pgkronika-bdd:${platform_slug}-sha-${image_hash:0:16}"
            echo "can_push=${BDD_IMAGE_CAN_PUSH}"
          } >> "$GITHUB_OUTPUT"

  bdd-matrix:
    name: bdd matrix
    needs: bdd-meta
    runs-on: ubuntu-latest
    concurrency:
      group: bdd-matrix-${{ needs.bdd-meta.outputs.platform_slug }}-${{ needs.bdd-meta.outputs.image_hash }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      BDD_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        if: needs.bdd-meta.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check cached BDD image
        id: final_image
        if: needs.bdd-meta.outputs.can_push == 'true'
        run: |
          image="${{ needs.bdd-meta.outputs.image }}"
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Reusing $image"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Pull cached BDD image
        if: needs.bdd-meta.outputs.can_push == 'true' && steps.final_image.outputs.exists == 'true'
        run: docker pull "${{ needs.bdd-meta.outputs.image }}"
      - name: Free disk space for the Nix build
        if: steps.final_image.outputs.exists != 'true'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/share/boost /opt/ghc
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          docker system prune -af || true
          df -h
      - uses: docker/setup-buildx-action@v3
        if: steps.final_image.outputs.exists != 'true'
      - name: Build BDD builder
        if: steps.final_image.outputs.exists != 'true'
        run: |
          export BDD_BUILDER_IMAGE="${{ needs.bdd-meta.outputs.builder }}"
          export BDD_BRANCH_NAME="${{ needs.bdd-meta.outputs.branch_name }}"
          export BDD_BUILDER_BRANCH_IMAGE="${{ needs.bdd-meta.outputs.builder_branch_cache }}"
          export BDD_BUILDER_MAIN_IMAGE="${{ needs.bdd-meta.outputs.builder_main_cache }}"
          export BDD_BUILDER_PULL=1
          if [ "${{ needs.bdd-meta.outputs.can_push }}" = "true" ]; then
            export BDD_BUILDER_PUSH=1
            export BDD_BUILDER_UPDATE_BRANCH_CACHE=1
          fi
          ./scripts/bdd-image.sh build-builder
      - name: Build BDD image
        if: steps.final_image.outputs.exists != 'true'
        run: |
          export BDD_BUILDER_IMAGE="${{ needs.bdd-meta.outputs.builder }}"
          export BDD_RUNTIME_IMAGE="${{ needs.bdd-meta.outputs.image }}"
          export BDD_RUNTIME_REUSE_LOCAL=1
          export BDD_OUTPUT_TAR=image.tar
          ./scripts/bdd-image.sh build-runtime
          rm -f image.tar
      - name: Verify PostgreSQL runtime
        run: ./scripts/bdd-image.sh check-runtime "${{ needs.bdd-meta.outputs.image }}"
      - name: Run the PostgreSQL matrix
        run: docker run --rm "${{ needs.bdd-meta.outputs.image }}"
      - name: Push BDD image
        if: needs.bdd-meta.outputs.can_push == 'true' && steps.final_image.outputs.exists != 'true'
        run: |
          image="${{ needs.bdd-meta.outputs.image }}"
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "Cache already published: $image"
          else
            docker push "$image"
          fi
