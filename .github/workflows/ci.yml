name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets

  deps:
    name: dependency rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- check-deps
      - run: bash scripts/test-bdd-image.sh

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --summary-only --json --output-path coverage.json
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.json

  bdd-meta:
    name: bdd metadata
    runs-on: ubuntu-latest
    outputs:
      deps_hash: ${{ steps.meta.outputs.deps_hash }}
      image_hash: ${{ steps.meta.outputs.image_hash }}
      platform_slug: ${{ steps.meta.outputs.platform_slug }}
      branch_name: ${{ steps.meta.outputs.branch_name }}
      branch_slug: ${{ steps.meta.outputs.branch_slug }}
      builder: ${{ steps.meta.outputs.builder }}
      builder_branch_cache: ${{ steps.meta.outputs.builder_branch_cache }}
      builder_main_cache: ${{ steps.meta.outputs.builder_main_cache }}
      image: ${{ steps.meta.outputs.image }}
      artifact: ${{ steps.meta.outputs.artifact }}
      transport: ${{ steps.meta.outputs.transport }}
      is_main_branch: ${{ steps.meta.outputs.is_main_branch }}
    env:
      BDD_IMAGE_CAN_PUSH: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      BDD_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      BDD_BRANCH_IS_MAIN: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      BDD_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - name: Compute image refs
        id: meta
        run: |
          deps_hash=$(./scripts/bdd-image.sh deps-key)
          image_hash=$(./scripts/bdd-image.sh image-key)
          platform_slug=$(echo "${BDD_PLATFORM}" | tr '/_' '-')
          branch_slug=$(./scripts/bdd-image.sh branch-slug "${BDD_BRANCH_NAME}")
          repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          {
            echo "deps_hash=${deps_hash:0:16}"
            echo "image_hash=${image_hash:0:16}"
            echo "platform_slug=${platform_slug}"
            echo "branch_name=${BDD_BRANCH_NAME}"
            echo "branch_slug=${branch_slug}"
            echo "builder=ghcr.io/${repo}/pgkronika-bdd-builder:deps-${platform_slug}-${deps_hash:0:16}"
            echo "builder_branch_cache=ghcr.io/${repo}/pgkronika-bdd-builder:deps-${platform_slug}-branch-${branch_slug}"
            echo "builder_main_cache=ghcr.io/${repo}/pgkronika-bdd-builder:deps-${platform_slug}-branch-main"
            echo "image=ghcr.io/${repo}/pgkronika-bdd:${platform_slug}-sha-${image_hash:0:16}"
            echo "artifact=pgkronika-bdd-${platform_slug}-${image_hash:0:16}"
            echo "is_main_branch=${BDD_BRANCH_IS_MAIN}"
            if [ "${BDD_IMAGE_CAN_PUSH}" = "true" ]; then
              echo "transport=registry"
            else
              echo "transport=artifact"
            fi
          } >> "$GITHUB_OUTPUT"

  bdd-builder:
    name: bdd builder
    needs: bdd-meta
    runs-on: ubuntu-latest
    concurrency:
      group: bdd-builder-${{ needs.bdd-meta.outputs.platform_slug }}-${{ needs.bdd-meta.outputs.deps_hash }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
    env:
      BDD_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        if: needs.bdd-meta.outputs.transport == 'registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check final image
        id: final_image
        if: needs.bdd-meta.outputs.transport == 'registry'
        run: |
          image="${{ needs.bdd-meta.outputs.image }}"
          if docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Reusing $image"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Free disk space for the Nix build
        if: needs.bdd-meta.outputs.transport == 'registry' && steps.final_image.outputs.exists != 'true'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/share/boost /opt/ghc
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          docker system prune -af || true
          df -h
      - uses: docker/setup-buildx-action@v3
        if: needs.bdd-meta.outputs.transport == 'registry' && steps.final_image.outputs.exists != 'true'
      - name: Build BDD builder
        if: needs.bdd-meta.outputs.transport == 'registry' && (steps.final_image.outputs.exists != 'true' || needs.bdd-meta.outputs.is_main_branch == 'true')
        run: |
          export BDD_BUILDER_IMAGE="${{ needs.bdd-meta.outputs.builder }}"
          export BDD_BRANCH_NAME="${{ needs.bdd-meta.outputs.branch_name }}"
          export BDD_BUILDER_BRANCH_IMAGE="${{ needs.bdd-meta.outputs.builder_branch_cache }}"
          export BDD_BUILDER_MAIN_IMAGE="${{ needs.bdd-meta.outputs.builder_main_cache }}"
          export BDD_BUILDER_PULL=1
          if [ "${{ needs.bdd-meta.outputs.transport }}" = "registry" ]; then
            export BDD_BUILDER_PUSH=1
          fi
          export BDD_BUILDER_UPDATE_BRANCH_CACHE=1
          ./scripts/bdd-image.sh build-builder
      - name: Skip registry builder for artifact transport
        if: needs.bdd-meta.outputs.transport == 'artifact'
        run: echo "Artifact transport builds its local builder in the bdd-image job."

  bdd-image:
    name: bdd image
    needs: [bdd-meta, bdd-builder]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ needs.bdd-meta.outputs.image }}
      artifact: ${{ needs.bdd-meta.outputs.artifact }}
      transport: ${{ needs.bdd-meta.outputs.transport }}
    env:
      BDD_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        if: needs.bdd-meta.outputs.transport == 'registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check final image
        id: final_image
        run: |
          image="${{ needs.bdd-meta.outputs.image }}"
          if [ "${{ needs.bdd-meta.outputs.transport }}" = "registry" ] && docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Reusing $image"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Free disk space for the Nix build
        if: steps.final_image.outputs.exists != 'true'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/share/boost /opt/ghc
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          docker system prune -af || true
          df -h
      - uses: docker/setup-buildx-action@v3
        if: needs.bdd-meta.outputs.transport == 'artifact' && steps.final_image.outputs.exists != 'true'
      - name: Build local BDD builder
        if: needs.bdd-meta.outputs.transport == 'artifact' && steps.final_image.outputs.exists != 'true'
        run: |
          export BDD_BUILDER_IMAGE="${{ needs.bdd-meta.outputs.builder }}"
          export BDD_BRANCH_NAME="${{ needs.bdd-meta.outputs.branch_name }}"
          export BDD_BUILDER_BRANCH_IMAGE="${{ needs.bdd-meta.outputs.builder_branch_cache }}"
          export BDD_BUILDER_MAIN_IMAGE="${{ needs.bdd-meta.outputs.builder_main_cache }}"
          export BDD_BUILDER_PULL=1
          ./scripts/bdd-image.sh build-builder
      - name: Build image
        if: steps.final_image.outputs.exists != 'true'
        run: |
          export BDD_BUILDER_IMAGE="${{ needs.bdd-meta.outputs.builder }}"
          export BDD_RUNTIME_IMAGE="${{ needs.bdd-meta.outputs.image }}"
          export BDD_OUTPUT_TAR=image.tar
          if [ "${{ needs.bdd-meta.outputs.transport }}" = "registry" ]; then
            export BDD_RUNTIME_PUSH=1
          fi
          ./scripts/bdd-image.sh build-runtime
      - name: Upload BDD image artifact
        if: needs.bdd-meta.outputs.transport == 'artifact' && steps.final_image.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.bdd-meta.outputs.artifact }}
          path: image.tar
          retention-days: 1

  # Run the built image on a separate runner.
  bdd-matrix:
    name: bdd matrix
    needs: bdd-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        if: needs.bdd-image.outputs.transport == 'registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and run the PostgreSQL matrix
        if: needs.bdd-image.outputs.transport == 'registry'
        run: |
          docker pull "${{ needs.bdd-image.outputs.image }}"
          docker run --rm "${{ needs.bdd-image.outputs.image }}"
      - name: Download BDD image artifact
        if: needs.bdd-image.outputs.transport == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.bdd-image.outputs.artifact }}
      - name: Load and run the PostgreSQL matrix
        if: needs.bdd-image.outputs.transport == 'artifact'
        run: |
          docker load -i image.tar
          docker run --rm pgkronika-bdd:latest
