name: CI

on:
  push:
    # PR #77 needs one trusted branch push to bootstrap schema-2 artifacts
    # before this workflow_dispatch trigger exists on the default branch.
    branches: [main, feat/incident-first-slice]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install musl linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y musl-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets

  deps:
    name: dependency rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install musl linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y musl-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo run -p xtask -- check-deps
      - run: bash scripts/test-bdd-image.sh

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install musl linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y musl-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install musl linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y musl-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@b98dda19e8b67e904c9e78a0cbd773be4105a74f # cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --summary-only --json --output-path coverage.json
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.json

  bdd-meta:
    name: bdd metadata
    runs-on: ubuntu-latest
    outputs:
      dependency_key: ${{ steps.meta.outputs.dependency_key }}
      source_key: ${{ steps.meta.outputs.source_key }}
      compiler_cache_key: ${{ steps.meta.outputs.compiler_cache_key }}
      platform_slug: ${{ steps.meta.outputs.platform_slug }}
      dependency_image: ${{ steps.meta.outputs.dependency_image }}
      pg_base_image: ${{ steps.meta.outputs.pg_base_image }}
      can_publish: ${{ steps.meta.outputs.can_publish }}
    env:
      BDD_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Compute immutable refs
        id: meta
        run: |
          owner=${GITHUB_REPOSITORY%%/*}
          owner=$(printf '%s' "$owner" | tr '[:upper:]' '[:lower:]')
          export BDD_IMAGE_PREFIX="ghcr.io/$owner"
          dependency_key=$(./scripts/bdd-image.sh deps-key)
          source_key=$(./scripts/bdd-image.sh source-key)
          compiler_cache_key=$(./scripts/bdd-image.sh compiler-cache-key)
          platform_slug=$(./scripts/bdd-image.sh platform-slug)
          dependency_image=$(./scripts/bdd-image.sh dependency-image)
          pg_base_image=$(./scripts/bdd-image.sh pg-base-image)
          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            can_publish=false
          else
            can_publish=true
          fi
          {
            echo "dependency_key=$dependency_key"
            echo "source_key=$source_key"
            echo "compiler_cache_key=$compiler_cache_key"
            echo "platform_slug=$platform_slug"
            echo "dependency_image=$dependency_image"
            echo "pg_base_image=$pg_base_image"
            echo "can_publish=$can_publish"
          } >> "$GITHUB_OUTPUT"
          {
            echo '## BDD cache contract'
            echo
            echo '- schema: `2`'
            echo "- dependency key: \`$dependency_key\`"
            echo "- source key: \`$source_key\`"
            echo '- Cargo target/features: `x86_64-unknown-linux-musl` / `default`'
            echo '- PostgreSQL matrix: `15,16,17,18` with `pg_store_plans`'
            echo "- first-party compiler cache: \`$compiler_cache_key\` (sccache/GHA, source excluded)"
            echo "- trusted publication: \`$can_publish\`"
          } >> "$GITHUB_STEP_SUMMARY"

  bdd-dependencies:
    name: bdd immutable dependencies
    needs: bdd-meta
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: bdd-deps-${{ needs.bdd-meta.outputs.platform_slug }}-${{ needs.bdd-meta.outputs.dependency_key }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      BDD_PLATFORM: linux/amd64
      BDD_DEPENDENCY_IMAGE: ${{ needs.bdd-meta.outputs.dependency_image }}
      BDD_PG_BASE_IMAGE: ${{ needs.bdd-meta.outputs.pg_base_image }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Publish or resolve exact dependencies
        id: publish
        env:
          BDD_TRUSTED_PUBLISH: "1"
          BDD_DEPENDENCY_PUSH: "1"
        run: |
          dependency_before=$(./scripts/bdd-image.sh resolve-ref "$BDD_DEPENDENCY_IMAGE" || true)
          pg_before=$(./scripts/bdd-image.sh resolve-ref "$BDD_PG_BASE_IMAGE" || true)
          ./scripts/bdd-image.sh build-dependencies
          dependency_digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_DEPENDENCY_IMAGE")
          pg_digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_PG_BASE_IMAGE")
          if [ -z "$dependency_before" ]; then dependency_published=true; else dependency_published=false; fi
          if [ -z "$pg_before" ]; then pg_published=true; else pg_published=false; fi
          {
            echo "dependency_digest_ref=$dependency_digest_ref"
            echo "dependency_subject=${dependency_digest_ref%@*}"
            echo "dependency_digest=${dependency_digest_ref##*@}"
            echo "dependency_published=$dependency_published"
            echo "pg_digest_ref=$pg_digest_ref"
            echo "pg_subject=${pg_digest_ref%@*}"
            echo "pg_digest=${pg_digest_ref##*@}"
            echo "pg_published=$pg_published"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ steps.publish.outputs.dependency_subject }}
          subject-digest: ${{ steps.publish.outputs.dependency_digest }}
          push-to-registry: true
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ steps.publish.outputs.pg_subject }}
          subject-digest: ${{ steps.publish.outputs.pg_digest }}
          push-to-registry: true
      - name: Verify anonymous pulls
        run: |
          docker logout ghcr.io
          if ! docker manifest inspect "$BDD_DEPENDENCY_IMAGE" >/dev/null; then
            echo "::error title=BDD_PUBLIC_PULL_BLOCKED::Cargo dependency package is not anonymously readable. Set the GHCR package visibility to public; PR/fork consumers must not receive registry credentials."
            exit 2
          fi
          if ! docker manifest inspect "$BDD_PG_BASE_IMAGE" >/dev/null; then
            echo "::error title=BDD_PUBLIC_PULL_BLOCKED::PostgreSQL base package is not anonymously readable. Set the GHCR package visibility to public; PR/fork consumers must not receive registry credentials."
            exit 2
          fi

  bdd-matrix:
    name: bdd matrix
    needs: [bdd-meta, bdd-dependencies]
    if: always() && needs.bdd-meta.result == 'success' && (needs.bdd-dependencies.result == 'success' || needs.bdd-dependencies.result == 'skipped')
    runs-on: ubuntu-latest
    concurrency:
      # A same-repository PR delegates to the exact-head push run. Keep that
      # waiter out of the source consumer's group or it could block the push
      # job it is waiting for.
      group: bdd-app-${{ needs.bdd-meta.outputs.platform_slug }}-${{ needs.bdd-meta.outputs.source_key }}-${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && 'delegate' || 'consume' }}
      cancel-in-progress: false
    permissions:
      actions: read
      contents: read
      packages: read
      attestations: read
    outputs:
      app_key: ${{ steps.refs.outputs.app_key }}
      final_hit: ${{ steps.final.outputs.hit }}
      runtime_image: ${{ steps.refs.outputs.runtime_image }}
      dependency_digest_ref: ${{ steps.refs.outputs.dependency_digest_ref }}
      pg_digest_ref: ${{ steps.refs.outputs.pg_digest_ref }}
    env:
      BDD_PLATFORM: linux/amd64
      BDD_DEPENDENCY_IMAGE: ${{ needs.bdd-meta.outputs.dependency_image }}
      BDD_PG_BASE_IMAGE: ${{ needs.bdd-meta.outputs.pg_base_image }}
      BDD_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Select trusted BDD route
        id: route
        env:
          BDD_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = pull_request ] && [ "$BDD_HEAD_REPOSITORY" = "$GITHUB_REPOSITORY" ]; then
            echo 'mode=delegate' >> "$GITHUB_OUTPUT"
          else
            echo 'mode=consume' >> "$GITHUB_OUTPUT"
          fi
      - name: Reuse exact-head trusted push result
        if: steps.route.outputs.mode == 'delegate'
        env:
          BDD_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          case "$BDD_HEAD_SHA" in
            *[!0-9a-f]*|'')
              echo 'invalid pull request head SHA' >&2
              exit 2
              ;;
          esac
          deadline=$((SECONDS + 7200))
          run_id=
          while [ "$SECONDS" -lt "$deadline" ]; do
            run_id=$(gh api --method GET \
              "repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs" \
              -f event=push -f per_page=100 \
              --jq ".workflow_runs[] | select(.head_sha == \"$BDD_HEAD_SHA\") | .id" \
              | head -n 1)
            if [ -n "$run_id" ]; then
              job=$(gh api --method GET \
                "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs" \
                -f per_page=100 \
                --jq '.jobs[] | select(.name == "bdd matrix") | [.status, (.conclusion // ""), .html_url] | @tsv' \
                | head -n 1)
              if [ -n "$job" ]; then
                IFS=$'\t' read -r status conclusion job_url <<< "$job"
                if [ "$status" = completed ]; then
                  if [ "$conclusion" != success ]; then
                    echo "::error title=BDD_TRUSTED_PUSH_FAILED::Exact-head push BDD concluded $conclusion: $job_url"
                    exit 2
                  fi
                  {
                    echo '## BDD trusted push delegation'
                    echo
                    echo "- exact head: \`$BDD_HEAD_SHA\`"
                    echo "- push run: \`$run_id\`"
                    echo "- trusted BDD job: $job_url"
                    echo '- duplicate PR source build: `skipped`'
                  } >> "$GITHUB_STEP_SUMMARY"
                  exit 0
                fi
              fi
            fi
            sleep 10
          done
          echo "::error title=BDD_TRUSTED_PUSH_TIMEOUT::No successful exact-head push BDD completed within 120 minutes for $BDD_HEAD_SHA"
          exit 2
      - name: Resolve immutable dependencies
        id: refs
        if: steps.route.outputs.mode == 'consume'
        run: |
          if ! dependency_digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_DEPENDENCY_IMAGE"); then
            echo "::error title=BDD_DEPENDENCY_MISSING::Immutable Cargo artifact for dependency key ${{ needs.bdd-meta.outputs.dependency_key }} is absent. Wait for or rerun the trusted push publisher; pull_request jobs cannot publish it."
            exit 2
          fi
          if ! pg_digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_PG_BASE_IMAGE"); then
            echo "::error title=BDD_PG_BASE_MISSING::Immutable PG15-18 base for dependency key ${{ needs.bdd-meta.outputs.dependency_key }} is absent. Wait for or rerun the trusted push publisher; pull_request jobs cannot publish it."
            exit 2
          fi
          gh attestation verify "oci://$dependency_digest_ref" --repo "$GITHUB_REPOSITORY"
          gh attestation verify "oci://$pg_digest_ref" --repo "$GITHUB_REPOSITORY"
          app_key=$(./scripts/bdd-image.sh app-key "$dependency_digest_ref" "$pg_digest_ref")
          runtime_image=$(./scripts/bdd-image.sh runtime-image "$dependency_digest_ref" "$pg_digest_ref")
          {
            echo "dependency_digest_ref=$dependency_digest_ref"
            echo "pg_digest_ref=$pg_digest_ref"
            echo "app_key=$app_key"
            echo "runtime_image=$runtime_image"
          } >> "$GITHUB_OUTPUT"
          {
            echo '## BDD resolved inputs'
            echo
            echo "- dependency digest: \`$dependency_digest_ref\`"
            echo "- PostgreSQL base digest: \`$pg_digest_ref\`"
            echo "- app key: \`$app_key\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Check exact runtime image
        id: final
        if: steps.route.outputs.mode == 'consume'
        env:
          BDD_RUNTIME_IMAGE: ${{ steps.refs.outputs.runtime_image }}
        run: |
          if digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_RUNTIME_IMAGE"); then
            if gh attestation verify "oci://$digest_ref" --repo "$GITHUB_REPOSITORY"; then
              echo "hit=true" >> "$GITHUB_OUTPUT"
              echo "digest_ref=$digest_ref" >> "$GITHUB_OUTPUT"
              echo '- exact runtime hit: `true`' >> "$GITHUB_STEP_SUMMARY"
            else
              echo "::warning title=BDD_RUNTIME_UNATTESTED::Exact runtime exists without valid repository provenance; rebuilding without consuming it."
              echo "hit=false" >> "$GITHUB_OUTPUT"
              echo '- exact runtime hit: `false` (attestation missing or invalid)' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
            echo '- exact runtime hit: `false`' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Pull exact runtime image
        if: steps.route.outputs.mode == 'consume' && steps.final.outputs.hit == 'true'
        run: docker pull "${{ steps.final.outputs.digest_ref }}"
      - name: Restore first-party compiler cache
        id: sccache-restore
        if: steps.route.outputs.mode == 'consume' && steps.final.outputs.hit != 'true'
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/bdd-sccache
          key: bdd-sccache-${{ needs.bdd-meta.outputs.compiler_cache_key }}-${{ github.run_id }}
          restore-keys: |
            bdd-sccache-${{ needs.bdd-meta.outputs.compiler_cache_key }}-
      - name: Prepare first-party compiler cache
        if: steps.route.outputs.mode == 'consume' && steps.final.outputs.hit != 'true'
        env:
          BDD_SCCACHE_DIR: ${{ runner.temp }}/bdd-sccache
          BDD_SCCACHE_MATCHED_KEY: ${{ steps.sccache-restore.outputs.cache-matched-key }}
        run: |
          mkdir -p "$BDD_SCCACHE_DIR"
          chmod 0777 "$BDD_SCCACHE_DIR"
          {
            echo '## BDD first-party compiler cache'
            echo
            echo "- namespace: \`${{ needs.bdd-meta.outputs.compiler_cache_key }}\`"
            echo "- restored generation: \`${BDD_SCCACHE_MATCHED_KEY:-none}\`"
            echo "- mode: \`${{ needs.bdd-meta.outputs.can_publish == 'true' && 'READ_WRITE' || 'READ_ONLY' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Free disk space for the source build
        if: steps.route.outputs.mode == 'consume' && steps.final.outputs.hit != 'true'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/share/boost /opt/ghc
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          docker system prune -af || true
          df -h
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        if: steps.route.outputs.mode == 'consume' && steps.final.outputs.hit != 'true'
      - name: Build source-only app layer
        if: steps.route.outputs.mode == 'consume' && steps.final.outputs.hit != 'true'
        env:
          BDD_DEPENDENCY_DIGEST_REF: ${{ steps.refs.outputs.dependency_digest_ref }}
          BDD_PG_BASE_DIGEST_REF: ${{ steps.refs.outputs.pg_digest_ref }}
          BDD_APP_LAYER: app-layer.tar
          BDD_SCCACHE_DIR: ${{ runner.temp }}/bdd-sccache
          BDD_SCCACHE_MODE: ${{ needs.bdd-meta.outputs.can_publish == 'true' && 'READ_WRITE' || 'READ_ONLY' }}
        run: ./scripts/bdd-image.sh build-app-layer
      - name: Assemble local runtime
        if: steps.route.outputs.mode == 'consume' && steps.final.outputs.hit != 'true'
        env:
          BDD_DEPENDENCY_DIGEST_REF: ${{ steps.refs.outputs.dependency_digest_ref }}
          BDD_PG_BASE_DIGEST_REF: ${{ steps.refs.outputs.pg_digest_ref }}
          BDD_RUNTIME_IMAGE: ${{ steps.refs.outputs.runtime_image }}
          BDD_APP_LAYER: app-layer.tar
        run: ./scripts/bdd-image.sh assemble-runtime
      - name: Verify PostgreSQL runtime contract
        if: steps.route.outputs.mode == 'consume'
        run: |
          if [ "${{ steps.final.outputs.hit }}" = true ]; then
            image="${{ steps.final.outputs.digest_ref }}"
          else
            image="${{ steps.refs.outputs.runtime_image }}"
          fi
          ./scripts/bdd-image.sh verify-pg-runtime "$image"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.route.outputs.mode == 'consume' && needs.bdd-meta.outputs.can_publish == 'true' && steps.final.outputs.hit != 'true'
        with:
          name: bdd-app-layer-${{ steps.refs.outputs.app_key }}
          path: app-layer.tar
          retention-days: 1
      - name: Run the PostgreSQL matrix
        if: steps.route.outputs.mode == 'consume'
        run: |
          if [ "${{ steps.final.outputs.hit }}" = true ]; then
            image="${{ steps.final.outputs.digest_ref }}"
          else
            image="${{ steps.refs.outputs.runtime_image }}"
          fi
          docker run --rm "$image"
      - name: Save trusted first-party compiler cache
        if: steps.route.outputs.mode == 'consume' && needs.bdd-meta.outputs.can_publish == 'true' && steps.final.outputs.hit != 'true' && success()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ${{ runner.temp }}/bdd-sccache
          key: bdd-sccache-${{ needs.bdd-meta.outputs.compiler_cache_key }}-${{ github.run_id }}

  bdd-final-publish:
    name: bdd trusted runtime publish
    needs: [bdd-meta, bdd-matrix]
    if: (github.event_name == 'workflow_dispatch' || github.event_name == 'push') && needs.bdd-matrix.outputs.final_hit != 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: bdd-final-${{ needs.bdd-matrix.outputs.app_key }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      BDD_PLATFORM: linux/amd64
      BDD_DEPENDENCY_DIGEST_REF: ${{ needs.bdd-matrix.outputs.dependency_digest_ref }}
      BDD_PG_BASE_DIGEST_REF: ${{ needs.bdd-matrix.outputs.pg_digest_ref }}
      BDD_RUNTIME_IMAGE: ${{ needs.bdd-matrix.outputs.runtime_image }}
      BDD_SOURCE_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bdd-app-layer-${{ needs.bdd-matrix.outputs.app_key }}
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Publish exact runtime
        id: publish
        env:
          BDD_TRUSTED_PUBLISH: "1"
          BDD_RUNTIME_PUSH: "1"
          BDD_APP_LAYER: app-layer.tar
        run: |
          before=$(./scripts/bdd-image.sh resolve-ref "$BDD_RUNTIME_IMAGE" || true)
          ./scripts/bdd-image.sh publish-runtime
          digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_RUNTIME_IMAGE")
          if [ -z "$before" ]; then published=true; else published=false; fi
          {
            echo "subject=${digest_ref%@*}"
            echo "digest=${digest_ref##*@}"
            echo "published=$published"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-name: ${{ steps.publish.outputs.subject }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
      - name: Verify anonymous pull
        run: |
          docker logout ghcr.io
          docker manifest inspect "$BDD_RUNTIME_IMAGE" >/dev/null
