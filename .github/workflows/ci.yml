name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  NIX_BUILD_IMAGE: docker.io/nixos/nix:2.31.2@sha256:29fc5fe207f159ceb0143c25c19c774062fee02ce5eda118f3067547b3054894

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets

  deps:
    name: dependency rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- check-deps

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --summary-only --json --output-path coverage.json
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.json

  # Build the BDD image with Nix once. Same-repo runs push a content-hash tag to
  # GHCR; fork PRs upload the tarball as a short-lived artifact.
  # Only Docker is used; Nix runs inside the nixos/nix build container.
  bdd-image:
    name: bdd image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      artifact: ${{ steps.meta.outputs.artifact }}
      transport: ${{ steps.meta.outputs.transport }}
    env:
      BDD_IMAGE_CAN_PUSH: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space for the Nix build
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/share/boost /opt/ghc
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          docker system prune -af || true
          df -h
      - name: Compute content-hash image ref
        id: meta
        run: |
          hash="${{ hashFiles('flake.lock', 'flake.nix', 'rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'crates/*/Cargo.toml', 'bins/*/Cargo.toml', 'xtask/Cargo.toml', 'crates/*/src/**', 'bins/*/src/**', 'crates/kronika-bdd/features/**') }}"
          repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${repo}/pgkronika-bdd:sha-${hash:0:16}" >> "$GITHUB_OUTPUT"
          echo "artifact=pgkronika-bdd-${hash:0:16}" >> "$GITHUB_OUTPUT"
          if [ "${BDD_IMAGE_CAN_PUSH}" = "true" ]; then
            echo "transport=registry" >> "$GITHUB_OUTPUT"
          else
            echo "transport=artifact" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to GHCR
        if: steps.meta.outputs.transport == 'registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image
        run: |
          image="${{ steps.meta.outputs.image }}"
          if [ "${{ steps.meta.outputs.transport }}" = "registry" ] && docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "Image $image already exists; skipping build."
            exit 0
          fi
          # Drop .git so Nix treats the checkout as a plain path: the runner
          # owns the checkout but Nix runs as root in the container, and
          # libgit2 refuses a repository it sees as "dubiously owned".
          docker run --rm -v "$PWD":/work \
            -e NIX_CONFIG="experimental-features = nix-command flakes" \
            "$NIX_BUILD_IMAGE" \
            sh -c 'rm -rf /work/.git && cd /work && nix build .#image --out-link /tmp/img && /tmp/img' > image.tar
          docker load -i image.tar
          if [ "${{ steps.meta.outputs.transport }}" = "registry" ]; then
            docker tag pgkronika-bdd:latest "$image"
            docker push "$image"
          fi
      - name: Upload BDD image artifact
        if: steps.meta.outputs.transport == 'artifact'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: image.tar
          retention-days: 1

  # The "launch on a new machine" path: pull or load the image and run it. The
  # image boots the whole PostgreSQL matrix in parallel internally.
  bdd-matrix:
    name: bdd matrix
    needs: bdd-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        if: needs.bdd-image.outputs.transport == 'registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and run the PostgreSQL matrix
        if: needs.bdd-image.outputs.transport == 'registry'
        run: |
          docker pull "${{ needs.bdd-image.outputs.image }}"
          docker run --rm "${{ needs.bdd-image.outputs.image }}"
      - name: Download BDD image artifact
        if: needs.bdd-image.outputs.transport == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.bdd-image.outputs.artifact }}
      - name: Load and run the PostgreSQL matrix
        if: needs.bdd-image.outputs.transport == 'artifact'
        run: |
          docker load -i image.tar
          docker run --rm pgkronika-bdd:latest
