name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets

  deps:
    name: dependency rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- check-deps

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --summary-only --json --output-path coverage.json
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.json

  # The builder image carries the Nix/Rust/PostgreSQL dependency store. Buildx
  # keeps that image warm in GHCR; the final BDD image is still tagged by content.
  bdd-image:
    name: bdd image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      artifact: ${{ steps.meta.outputs.artifact }}
      transport: ${{ steps.meta.outputs.transport }}
    env:
      BDD_IMAGE_CAN_PUSH: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      BDD_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@v4
      - name: Compute image refs
        id: meta
        run: |
          deps_hash=$(./scripts/bdd-image.sh deps-key)
          image_hash=$(./scripts/bdd-image.sh image-key)
          platform_slug=$(echo "${BDD_PLATFORM}" | tr '/_' '-')
          repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "builder=ghcr.io/${repo}/pgkronika-bdd-builder:deps-${platform_slug}-${deps_hash:0:16}" >> "$GITHUB_OUTPUT"
          echo "build_cache=ghcr.io/${repo}/pgkronika-bdd-buildcache:${platform_slug}-main" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${repo}/pgkronika-bdd:${platform_slug}-sha-${image_hash:0:16}" >> "$GITHUB_OUTPUT"
          echo "artifact=pgkronika-bdd-${platform_slug}-${image_hash:0:16}" >> "$GITHUB_OUTPUT"
          if [ "${BDD_IMAGE_CAN_PUSH}" = "true" ]; then
            echo "transport=registry" >> "$GITHUB_OUTPUT"
          else
            echo "transport=artifact" >> "$GITHUB_OUTPUT"
          fi
      - name: Log in to GHCR
        if: steps.meta.outputs.transport == 'registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Check final image
        id: final_image
        run: |
          image="${{ steps.meta.outputs.image }}"
          if [ "${{ steps.meta.outputs.transport }}" = "registry" ] && docker manifest inspect "$image" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Reusing $image"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Free disk space for the Nix build
        if: steps.final_image.outputs.exists != 'true'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/share/boost /opt/ghc
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          docker system prune -af || true
          df -h
      - uses: docker/setup-buildx-action@v3
        if: steps.final_image.outputs.exists != 'true'
      - name: Build BDD builder
        if: steps.final_image.outputs.exists != 'true'
        run: |
          export BDD_BUILDER_IMAGE="${{ steps.meta.outputs.builder }}"
          export BDD_BUILDER_PULL=1
          if [ "${{ steps.meta.outputs.transport }}" = "registry" ]; then
            export BDD_CACHE_FROM="type=registry,ref=${{ steps.meta.outputs.build_cache }}"
            export BDD_CACHE_TO="type=registry,ref=${{ steps.meta.outputs.build_cache }},mode=max"
            export BDD_BUILDER_PUSH=1
          fi
          ./scripts/bdd-image.sh build-builder
      - name: Build image
        if: steps.final_image.outputs.exists != 'true'
        run: |
          export BDD_BUILDER_IMAGE="${{ steps.meta.outputs.builder }}"
          export BDD_RUNTIME_IMAGE="${{ steps.meta.outputs.image }}"
          export BDD_OUTPUT_TAR=image.tar
          if [ "${{ steps.meta.outputs.transport }}" = "registry" ]; then
            export BDD_RUNTIME_PUSH=1
          fi
          ./scripts/bdd-image.sh build-runtime
      - name: Upload BDD image artifact
        if: steps.meta.outputs.transport == 'artifact' && steps.final_image.outputs.exists != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact }}
          path: image.tar
          retention-days: 1

  # The "launch on a new machine" path: pull or load the image and run it. The
  # image boots the whole PostgreSQL matrix in parallel internally.
  bdd-matrix:
    name: bdd matrix
    needs: bdd-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        if: needs.bdd-image.outputs.transport == 'registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and run the PostgreSQL matrix
        if: needs.bdd-image.outputs.transport == 'registry'
        run: |
          docker pull "${{ needs.bdd-image.outputs.image }}"
          docker run --rm "${{ needs.bdd-image.outputs.image }}"
      - name: Download BDD image artifact
        if: needs.bdd-image.outputs.transport == 'artifact'
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.bdd-image.outputs.artifact }}
      - name: Load and run the PostgreSQL matrix
        if: needs.bdd-image.outputs.transport == 'artifact'
        run: |
          docker load -i image.tar
          docker run --rm pgkronika-bdd:latest
