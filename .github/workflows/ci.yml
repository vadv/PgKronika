name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  # CI cargo jobs build for host gnu; .cargo/config pins musl for release
  # binaries, but runners have no musl std, so tests/lint can't find core.
  CARGO_BUILD_TARGET: x86_64-unknown-linux-gnu

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets

  deps:
    name: dependency rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask -- check-deps
      - run: bash scripts/test-bdd-image.sh

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --summary-only --json --output-path coverage.json
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.json

  bdd-matrix:
    name: bdd matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      BDD_PLATFORM: linux/amd64
      BDD_RUNTIME_IMAGE: pgkronika-bdd:run-${{ github.run_id }}-${{ github.run_attempt }}
      BDD_BUILDER_CAN_PUSH: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute exact dependency builder
        id: meta
        run: |
          deps_hash=$(./scripts/bdd-image.sh deps-key)
          platform_slug=$(./scripts/bdd-image.sh platform-slug)
          owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          builder="ghcr.io/${owner}/pgkronika-bdd-builder:builder-${platform_slug}-${deps_hash:0:16}"
          {
            echo "deps_hash=${deps_hash}"
            echo "builder=${builder}"
            echo "can_push=${BDD_BUILDER_CAN_PUSH}"
          } >> "$GITHUB_OUTPUT"
          echo "BDD dependency key: ${deps_hash}"
          echo "BDD exact builder: ${builder}"
          {
            echo '## BDD cache'
            echo
            echo "- dependency key: \`${deps_hash}\`"
            echo "- exact builder: \`${builder}\`"
            echo "- local runtime: \`${BDD_RUNTIME_IMAGE}\` (never published)"
            echo '- source build: always runs; clean hosted runners do not cache first-party compilation'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Check exact dependency builder
        id: builder
        run: |
          if docker manifest inspect "${{ steps.meta.outputs.builder }}" >/dev/null 2>&1; then
            echo 'exists=true' >> "$GITHUB_OUTPUT"
            echo 'BDD builder exact hit'
          else
            echo 'exists=false' >> "$GITHUB_OUTPUT"
            echo 'BDD builder exact miss'
          fi
      - name: Free disk space for the BDD build
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/share/boost /opt/ghc
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          docker system prune -af || true
          df -h
      - name: Pull exact dependency builder
        if: steps.builder.outputs.exists == 'true'
        run: docker pull "${{ steps.meta.outputs.builder }}"
      - name: Log in to GHCR for missing builder
        if: steps.builder.outputs.exists != 'true' && steps.meta.outputs.can_push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
        if: steps.builder.outputs.exists != 'true'
      - name: Build missing dependency builder
        if: steps.builder.outputs.exists != 'true'
        run: |
          export BDD_BUILDER_IMAGE="${{ steps.meta.outputs.builder }}"
          if [ "${{ steps.meta.outputs.can_push }}" = "true" ]; then
            export BDD_BUILDER_PUSH=1
          fi
          ./scripts/bdd-image.sh build-builder
      - name: Compile source and assemble local BDD runtime
        run: |
          export BDD_BUILDER_IMAGE="${{ steps.meta.outputs.builder }}"
          export BDD_OUTPUT_TAR=image.tar
          started=$SECONDS
          ./scripts/bdd-image.sh build-runtime
          elapsed=$((SECONDS - started))
          echo "BDD source build seconds: ${elapsed}"
          echo "- source build seconds: ${elapsed}" >> "$GITHUB_STEP_SUMMARY"
          rm -f image.tar
      - name: Verify PostgreSQL runtime
        run: ./scripts/bdd-image.sh check-runtime
      - name: Run the PostgreSQL matrix
        run: ./scripts/bdd-image.sh run
