name: CI

on:
  push:
    # PR #77 needs one trusted branch push to bootstrap schema-2 artifacts
    # before this workflow_dispatch trigger exists on the default branch.
    branches: [main, feat/incident-first-slice]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

permissions:
  contents: read

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install musl linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y musl-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets

  deps:
    name: dependency rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install musl linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y musl-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo run -p xtask -- check-deps
      - run: bash scripts/test-bdd-image.sh

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install musl linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y musl-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - run: cargo test --workspace

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install musl linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install --no-install-recommends -y musl-tools
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@b98dda19e8b67e904c9e78a0cbd773be4105a74f # cargo-llvm-cov
      - name: Collect coverage
        run: |
          cargo llvm-cov --workspace --summary-only --json --output-path coverage.json
          echo '## Coverage' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cargo llvm-cov report >> "$GITHUB_STEP_SUMMARY" 2>&1 || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.json

  bdd-meta:
    name: bdd metadata
    runs-on: ubuntu-latest
    outputs:
      dependency_key: ${{ steps.meta.outputs.dependency_key }}
      source_key: ${{ steps.meta.outputs.source_key }}
      platform_slug: ${{ steps.meta.outputs.platform_slug }}
      dependency_image: ${{ steps.meta.outputs.dependency_image }}
      pg_base_image: ${{ steps.meta.outputs.pg_base_image }}
      can_publish: ${{ steps.meta.outputs.can_publish }}
    env:
      BDD_PLATFORM: linux/amd64
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Compute immutable refs
        id: meta
        run: |
          repo=$(echo "$GITHUB_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          export BDD_IMAGE_PREFIX="ghcr.io/$repo"
          dependency_key=$(./scripts/bdd-image.sh deps-key)
          source_key=$(./scripts/bdd-image.sh source-key)
          platform_slug=$(./scripts/bdd-image.sh platform-slug)
          dependency_image=$(./scripts/bdd-image.sh dependency-image)
          pg_base_image=$(./scripts/bdd-image.sh pg-base-image)
          if [ "$GITHUB_EVENT_NAME" = pull_request ]; then
            can_publish=false
          else
            can_publish=true
          fi
          {
            echo "dependency_key=$dependency_key"
            echo "source_key=$source_key"
            echo "platform_slug=$platform_slug"
            echo "dependency_image=$dependency_image"
            echo "pg_base_image=$pg_base_image"
            echo "can_publish=$can_publish"
          } >> "$GITHUB_OUTPUT"
          {
            echo '## BDD cache contract'
            echo
            echo '- schema: `2`'
            echo "- dependency key: \`$dependency_key\`"
            echo "- source key: \`$source_key\`"
            echo '- Cargo target/features: `x86_64-unknown-linux-musl` / `default`'
            echo '- PostgreSQL matrix: `15,16,17,18` with `pg_store_plans`'
            echo "- trusted publication: \`$can_publish\`"
          } >> "$GITHUB_STEP_SUMMARY"

  bdd-dependencies:
    name: bdd immutable dependencies
    needs: bdd-meta
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: bdd-deps-${{ needs.bdd-meta.outputs.platform_slug }}-${{ needs.bdd-meta.outputs.dependency_key }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      BDD_PLATFORM: linux/amd64
      BDD_DEPENDENCY_IMAGE: ${{ needs.bdd-meta.outputs.dependency_image }}
      BDD_PG_BASE_IMAGE: ${{ needs.bdd-meta.outputs.pg_base_image }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Publish or resolve exact dependencies
        id: publish
        env:
          BDD_TRUSTED_PUBLISH: "1"
          BDD_DEPENDENCY_PUSH: "1"
        run: |
          dependency_before=$(./scripts/bdd-image.sh resolve-ref "$BDD_DEPENDENCY_IMAGE" || true)
          pg_before=$(./scripts/bdd-image.sh resolve-ref "$BDD_PG_BASE_IMAGE" || true)
          ./scripts/bdd-image.sh build-dependencies
          dependency_digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_DEPENDENCY_IMAGE")
          pg_digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_PG_BASE_IMAGE")
          if [ -z "$dependency_before" ]; then dependency_published=true; else dependency_published=false; fi
          if [ -z "$pg_before" ]; then pg_published=true; else pg_published=false; fi
          {
            echo "dependency_digest_ref=$dependency_digest_ref"
            echo "dependency_subject=${dependency_digest_ref%@*}"
            echo "dependency_digest=${dependency_digest_ref##*@}"
            echo "dependency_published=$dependency_published"
            echo "pg_digest_ref=$pg_digest_ref"
            echo "pg_subject=${pg_digest_ref%@*}"
            echo "pg_digest=${pg_digest_ref##*@}"
            echo "pg_published=$pg_published"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        if: steps.publish.outputs.dependency_published == 'true'
        with:
          subject-name: ${{ steps.publish.outputs.dependency_subject }}
          subject-digest: ${{ steps.publish.outputs.dependency_digest }}
          push-to-registry: true
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        if: steps.publish.outputs.pg_published == 'true'
        with:
          subject-name: ${{ steps.publish.outputs.pg_subject }}
          subject-digest: ${{ steps.publish.outputs.pg_digest }}
          push-to-registry: true
      - name: Verify anonymous pulls
        run: |
          docker logout ghcr.io
          docker manifest inspect "$BDD_DEPENDENCY_IMAGE" >/dev/null
          docker manifest inspect "$BDD_PG_BASE_IMAGE" >/dev/null

  bdd-matrix:
    name: bdd matrix
    needs: [bdd-meta, bdd-dependencies]
    if: always() && needs.bdd-meta.result == 'success' && (needs.bdd-dependencies.result == 'success' || needs.bdd-dependencies.result == 'skipped')
    runs-on: ubuntu-latest
    concurrency:
      group: bdd-app-${{ needs.bdd-meta.outputs.platform_slug }}-${{ needs.bdd-meta.outputs.source_key }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
      attestations: read
    outputs:
      app_key: ${{ steps.refs.outputs.app_key }}
      final_hit: ${{ steps.final.outputs.hit }}
      runtime_image: ${{ steps.refs.outputs.runtime_image }}
      dependency_digest_ref: ${{ steps.refs.outputs.dependency_digest_ref }}
      pg_digest_ref: ${{ steps.refs.outputs.pg_digest_ref }}
    env:
      BDD_PLATFORM: linux/amd64
      BDD_DEPENDENCY_IMAGE: ${{ needs.bdd-meta.outputs.dependency_image }}
      BDD_PG_BASE_IMAGE: ${{ needs.bdd-meta.outputs.pg_base_image }}
      BDD_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve immutable dependencies
        id: refs
        run: |
          if ! dependency_digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_DEPENDENCY_IMAGE"); then
            echo "::error title=BDD_DEPENDENCY_MISSING::Immutable Cargo artifact for dependency key ${{ needs.bdd-meta.outputs.dependency_key }} is absent. Wait for or rerun the trusted push publisher; pull_request jobs cannot publish it."
            exit 2
          fi
          if ! pg_digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_PG_BASE_IMAGE"); then
            echo "::error title=BDD_PG_BASE_MISSING::Immutable PG15-18 base for dependency key ${{ needs.bdd-meta.outputs.dependency_key }} is absent. Wait for or rerun the trusted push publisher; pull_request jobs cannot publish it."
            exit 2
          fi
          gh attestation verify "oci://$dependency_digest_ref" --repo "$GITHUB_REPOSITORY"
          gh attestation verify "oci://$pg_digest_ref" --repo "$GITHUB_REPOSITORY"
          app_key=$(./scripts/bdd-image.sh app-key "$dependency_digest_ref" "$pg_digest_ref")
          runtime_image=$(./scripts/bdd-image.sh runtime-image "$dependency_digest_ref" "$pg_digest_ref")
          {
            echo "dependency_digest_ref=$dependency_digest_ref"
            echo "pg_digest_ref=$pg_digest_ref"
            echo "app_key=$app_key"
            echo "runtime_image=$runtime_image"
          } >> "$GITHUB_OUTPUT"
          {
            echo '## BDD resolved inputs'
            echo
            echo "- dependency digest: \`$dependency_digest_ref\`"
            echo "- PostgreSQL base digest: \`$pg_digest_ref\`"
            echo "- app key: \`$app_key\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Check exact runtime image
        id: final
        env:
          BDD_RUNTIME_IMAGE: ${{ steps.refs.outputs.runtime_image }}
        run: |
          if digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_RUNTIME_IMAGE"); then
            gh attestation verify "oci://$digest_ref" --repo "$GITHUB_REPOSITORY"
            echo "hit=true" >> "$GITHUB_OUTPUT"
            echo "digest_ref=$digest_ref" >> "$GITHUB_OUTPUT"
            echo '- exact runtime hit: `true`' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "hit=false" >> "$GITHUB_OUTPUT"
            echo '- exact runtime hit: `false`' >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Pull exact runtime image
        if: steps.final.outputs.hit == 'true'
        run: docker pull "${{ steps.final.outputs.digest_ref }}"
      - name: Free disk space for the source build
        if: steps.final.outputs.hit != 'true'
        run: |
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /usr/local/share/boost /opt/ghc
          if [ -n "${AGENT_TOOLSDIRECTORY:-}" ]; then
            sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          fi
          docker system prune -af || true
          df -h
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        if: steps.final.outputs.hit != 'true'
      - name: Build source-only app layer
        if: steps.final.outputs.hit != 'true'
        env:
          BDD_DEPENDENCY_DIGEST_REF: ${{ steps.refs.outputs.dependency_digest_ref }}
          BDD_PG_BASE_DIGEST_REF: ${{ steps.refs.outputs.pg_digest_ref }}
          BDD_APP_LAYER: app-layer.tar
        run: ./scripts/bdd-image.sh build-app-layer
      - name: Assemble local runtime
        if: steps.final.outputs.hit != 'true'
        env:
          BDD_DEPENDENCY_DIGEST_REF: ${{ steps.refs.outputs.dependency_digest_ref }}
          BDD_PG_BASE_DIGEST_REF: ${{ steps.refs.outputs.pg_digest_ref }}
          BDD_RUNTIME_IMAGE: ${{ steps.refs.outputs.runtime_image }}
          BDD_APP_LAYER: app-layer.tar
        run: ./scripts/bdd-image.sh assemble-runtime
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: needs.bdd-meta.outputs.can_publish == 'true' && steps.final.outputs.hit != 'true'
        with:
          name: bdd-app-layer-${{ steps.refs.outputs.app_key }}
          path: app-layer.tar
          retention-days: 1
      - name: Run the PostgreSQL matrix
        run: |
          if [ "${{ steps.final.outputs.hit }}" = true ]; then
            image="${{ steps.final.outputs.digest_ref }}"
          else
            image="${{ steps.refs.outputs.runtime_image }}"
          fi
          docker run --rm "$image"

  bdd-final-publish:
    name: bdd trusted runtime publish
    needs: [bdd-meta, bdd-matrix]
    if: (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) && needs.bdd-matrix.outputs.final_hit != 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: bdd-final-${{ needs.bdd-matrix.outputs.app_key }}
      cancel-in-progress: false
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    env:
      BDD_PLATFORM: linux/amd64
      BDD_DEPENDENCY_DIGEST_REF: ${{ needs.bdd-matrix.outputs.dependency_digest_ref }}
      BDD_PG_BASE_DIGEST_REF: ${{ needs.bdd-matrix.outputs.pg_digest_ref }}
      BDD_RUNTIME_IMAGE: ${{ needs.bdd-matrix.outputs.runtime_image }}
      BDD_SOURCE_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: bdd-app-layer-${{ needs.bdd-matrix.outputs.app_key }}
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Publish exact runtime
        id: publish
        env:
          BDD_TRUSTED_PUBLISH: "1"
          BDD_RUNTIME_PUSH: "1"
          BDD_APP_LAYER: app-layer.tar
        run: |
          before=$(./scripts/bdd-image.sh resolve-ref "$BDD_RUNTIME_IMAGE" || true)
          ./scripts/bdd-image.sh publish-runtime
          digest_ref=$(./scripts/bdd-image.sh resolve-ref "$BDD_RUNTIME_IMAGE")
          if [ -z "$before" ]; then published=true; else published=false; fi
          {
            echo "subject=${digest_ref%@*}"
            echo "digest=${digest_ref##*@}"
            echo "published=$published"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        if: steps.publish.outputs.published == 'true'
        with:
          subject-name: ${{ steps.publish.outputs.subject }}
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true
      - name: Verify anonymous pull
        run: |
          docker logout ghcr.io
          docker manifest inspect "$BDD_RUNTIME_IMAGE" >/dev/null
